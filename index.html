<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example DAO - Dashboard de Votação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2.8rem;
            margin-bottom: 40px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: -1px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 350px 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        button {
            cursor: pointer;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-main:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: #818cf8;
            margin-top: 10px;
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .wallet-info {
            background: rgba(15, 23, 42, 0.5);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .wallet-info p {
            margin: 10px 0;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wallet-info span.value {
            font-weight: 600;
            color: #818cf8;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .proposals-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .prop-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .prop-item:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(5px);
        }

        .prop-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }

        .prop-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .prop-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
            word-break: break-word;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 15px;
        }

        .badge-open {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-closed {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Elementos da Barra de Progresso do Resultado */
        .result-container {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .result-bar-bg {
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .result-bar-sim {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            transition: width 1s ease-out;
        }

        .result-bar-nao {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            transition: width 1s ease-out;
        }

        .result-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .prop-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(0, 0, 0, 0.25);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat-value.sim {
            color: #34d399;
        }

        .stat-value.nao {
            color: #f87171;
        }

        .prop-footer {
            display: flex;
            gap: 15px;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner-large {
            width: 40px;
            height: 40px;
            border-width: 4px;
            border-top-color: var(--primary);
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-left: 4px solid var(--primary);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-action h3 {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
    </style>
</head>

<body>

    <h1>🌐 Example DAO</h1>

    <div class="container">
        <!-- Coluna Esquerda: Painel de Controle -->
        <div class="side-panel" style="display: flex; flex-direction: column; gap: 25px;">
            <!-- Cartão 1: Conexão Carteira -->
            <div class="card">
                <h3>Conectar</h3>

                <button id="btnConectar" class="btn-main" onclick="conectar()">
                    <span class="loader" id="loaderConectar"></span> 🔗 Conectar MetaMask
                </button>

                <div id="painelUsuario" style="display: none; margin-top: 20px;">
                    <div class="wallet-info">
                        <p><span>📍 Conta Logada:</span> <span class="value" id="statusWallet">...</span></p>
                        <p><span>💎 Saldo Sepolia:</span> <span class="value"><span id="userEthBalance">0</span>
                                ETH</span></p>
                    </div>

                    <a href="https://cloud.google.com/application/web3/faucet/ethereum/sepolia" target="_blank"
                        style="text-decoration: none;">
                        <button class="btn-outline" style="margin-top: 5px; border-color: #8b5cf6; color: #a78bfa;">
                            Obter ETH (Sepolia Faucet)
                        </button>
                    </a>

                    <button id="btnMudarRede" class="btn-outline"
                        style="margin-top: 10px; border-color: #f6851b; color: #f6851b; display: none;"
                        onclick="mudarRedeSepolia()">
                        Mudar p/ Rede Sepolia
                    </button>
                </div>
            </div>

            <!-- Cartão 2: Criar Proposta -->
            <div class="card" id="cardNovaProposta" style="display: none;">
                <h3>Nova Proposta</h3>
                <input type="text" id="propTitulo" placeholder="Título (Ex: Novo airdrop?)">
                <input type="number" id="propDuracao" placeholder="Duração em Blocos (Ex: 100)"
                    oninput="calcularEstimativa(this.value)">
                <p id="estimativaBlocos"
                    style="font-size:0.8rem; color:var(--text-muted); margin-top:2px; min-height:15px;"></p>
                <button id="btnCriarProposta" onclick="criarProposta()" class="btn-main" style="margin-top: 5px;">
                    <span class="loader" id="loaderProposta"></span> 🚀 Lançar Proposta
                </button>
            </div>
        </div>

        <!-- Coluna Direita: Governança -->
        <div class="card" style="min-height: 500px;">
            <div class="header-action">
                <h3>Propostas</h3>
                <button onclick="listarPropostas()" class="btn-outline"
                    style="width: auto; padding: 10px 16px; margin: 0;">
                    🔄 Atualizar
                </button>
            </div>
            <p style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.95rem;" id="currentBlockInfo">
                Aguardando conexão...
            </p>

            <div id="listaPropostas" class="proposals-list">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    Conecte a carteira para carregar as propostas
                </div>
            </div>
        </div>
    </div>

    <!-- Notificações Toast -->
    <div id="notification" class="notification">
        Notificação
    </div>

    <script>
        // CONFIGURAÇÕES DOS CONTRATOS
        const daoAddress = "0x6A25A56C3ED72EADCA0aAF34330794619791EF72";

        const daoAbi = [
            "function criarProposta(string _titulo, uint256 _duracaoEmBlocos) public",
            "function votar(uint256 _propostaId, bool _apoia) public",
            "function statusProposta(uint256 _propostaId) view returns (string titulo, uint256 sim, uint256 nao, uint256 terminaNoBloco, bool ativa)",
            "function blocoAtual() view returns (uint256)",
            "function totalPropostas() view returns (uint256)",
            "event VotoRegistrado(uint256 id, address votante, bool apoio)"
        ];

        let provider, signer, daoContract;
        let currentAddress = "";

        // UI Utils
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
            notif.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--success)';
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 4000);
        }

        function toggleLoading(btnId, isLoading, loaderId) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            const loader = document.getElementById(loaderId || `loader${btnId.replace('btn', '')}`);
            if (loader) loader.style.display = isLoading ? 'inline-block' : 'none';
            btn.disabled = isLoading;
        }

        function formatAddress(address) {
            return `${address.substring(0, 6)}...${address.substring(38)}`;
        }

        async function conectar() {
            toggleLoading('btnConectar', true);
            try {
                if (window.location.protocol === 'file:') {
                    showNotification("MetaMask NÃO funciona em arquivos locais (file://). Use um servidor HTTP (ex: localhost:3000)!", true);
                    return;
                }

                let ethProvider = null;

                // 1. Tenta usar o padrão EIP-6963 (Multiplas Carteiras) se o navegador der suporte
                // Mas de forma simplificada, varrendo window.ethereum.providers se existir
                if (window.ethereum) {
                    if (window.ethereum.providers && window.ethereum.providers.length > 0) {
                        // Se houver múltiplas carteiras injetadas, prioriza a MetaMask se disponível
                        ethProvider = window.ethereum.providers.find(p => p.isMetaMask) || window.ethereum.providers[0];
                    } else {
                        ethProvider = window.ethereum;
                    }
                }

                // Em alguns navegadores, o objeto demora alguns milissegundos para ser injetado.
                if (!ethProvider) {
                    await new Promise(r => setTimeout(r, 500));
                    ethProvider = window.ethereum;
                }

                if (ethProvider) {
                    // Requisitar acesso à carteira explicitamente
                    await ethProvider.request({ method: 'eth_requestAccounts' });

                    // Garantir que a carteira esteja na rede SEPOLIA (Chain ID 11155111 = 0xaa36a7)
                    const sepoliaChainId = '0xaa36a7';
                    const currentChainId = await ethProvider.request({ method: 'eth_chainId' });

                    if (currentChainId !== sepoliaChainId) {
                        try {
                            showNotification("Trocando para a rede Sepolia...");
                            await ethProvider.request({
                                method: 'wallet_switchEthereumChain',
                                params: [{ chainId: sepoliaChainId }],
                            });
                        } catch (switchError) {
                            // Erro 4902 significa que a rede ainda não foi adicionada no MetaMask
                            if (switchError.code === 4902) {
                                await ethProvider.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [
                                        {
                                            chainId: sepoliaChainId,
                                            chainName: 'Sepolia test network',
                                            rpcUrls: ['https://sepolia.infura.io/v3/'],
                                            nativeCurrency: {
                                                name: 'Sepolia ETH',
                                                symbol: 'SEP',
                                                decimals: 18
                                            },
                                            blockExplorerUrls: ['https://sepolia.etherscan.io']
                                        }
                                    ]
                                });
                            } else {
                                throw switchError;
                            }
                        }
                    }

                    provider = new ethers.BrowserProvider(ethProvider);
                    signer = await provider.getSigner();
                    currentAddress = await signer.getAddress();

                    document.getElementById('statusWallet').innerText = formatAddress(currentAddress);

                    try {
                        const balanceEth = await provider.getBalance(currentAddress);
                        document.getElementById('userEthBalance').innerText = parseFloat(ethers.formatEther(balanceEth)).toFixed(4);
                    } catch (e) {
                        console.error("Erro ao buscar saldo de ETH:", e);
                    }

                    // Verifica qual rede final ficou para mostrar o botão de trocar rede ou não
                    const finalChainId = await ethProvider.request({ method: 'eth_chainId' });
                    const isSepolia = (finalChainId === sepoliaChainId);
                    document.getElementById('btnMudarRede').style.display = isSepolia ? 'none' : 'block';
                    document.getElementById('cardNovaProposta').style.display = isSepolia ? 'flex' : 'none';

                    document.getElementById('btnConectar').style.display = 'none';
                    document.getElementById('painelUsuario').style.display = 'block';

                    daoContract = new ethers.Contract(daoAddress, daoAbi, signer);

                    await listarPropostas();
                    showNotification("Carteira conectada com sucesso!");
                } else {
                    showNotification("Erro: Nenhuma carteira Web3 injetada detectada. Ative apenas UMA extensão e recarregue a página.", true);
                }
            } catch (err) {
                console.error("Erro Conexão:", err);
                if (err.code === 4001) {
                    showNotification("Conexão ou troca de rede recusada pelo usuário.", true);
                } else {
                    showNotification("Erro ao conectar carteira: " + (err.reason || err.message), true);
                }
            } finally {
                toggleLoading('btnConectar', false);
            }
        }



        let blocoAtualGlobal = 0;

        async function mudarRedeSepolia() {
            if (!window.ethereum) {
                showNotification("MetaMask não detectada!", true);
                return;
            }
            try {
                const sepoliaChainId = '0xaa36a7';
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: sepoliaChainId }],
                });
                showNotification("Rede trocada com sucesso para Sepolia!");
            } catch (switchError) {
                // Erro 4902 significa que a rede ainda não foi adicionada no MetaMask
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [
                                {
                                    chainId: '0xaa36a7',
                                    chainName: 'Sepolia test network',
                                    rpcUrls: ['https://sepolia.infura.io/v3/'],
                                    nativeCurrency: {
                                        name: 'Sepolia ETH',
                                        symbol: 'SEP',
                                        decimals: 18
                                    },
                                    blockExplorerUrls: ['https://sepolia.etherscan.io']
                                }
                            ]
                        });
                        showNotification("Rede Sepolia adicionada e ativada!");
                    } catch (addError) {
                        showNotification("Erro ao adicionar a rede Sepolia.", true);
                    }
                } else {
                    showNotification("Troca de rede cancelada.", true);
                }
            }
        }



        function calcularEstimativa(duracaoStr) {
            const display = document.getElementById('estimativaBlocos');
            const duracao = parseInt(duracaoStr);
            if (!duracao || duracao <= 0 || blocoAtualGlobal === 0) {
                display.innerText = "";
                return;
            }
            const blocoFinal = blocoAtualGlobal + duracao;
            const tempoSegundos = duracao * 12; // Média de 12s por bloco no Ethereum
            let tempoStr = "";
            if (tempoSegundos < 60) tempoStr = `${tempoSegundos} segs`;
            else if (tempoSegundos < 3600) tempoStr = `~ ${(tempoSegundos / 60).toFixed(0)} mins`;
            else tempoStr = `~ ${(tempoSegundos / 3600).toFixed(1)} horas`;

            display.innerText = `🏁 Bloco ${blocoFinal} (${tempoStr})`;
        }

        async function criarProposta() {
            const titulo = document.getElementById('propTitulo').value.trim();
            const duracao = document.getElementById('propDuracao').value;

            if (!titulo || !duracao || duracao <= 0) {
                showNotification("Preencha título e duração válida!", true);
                return;
            }

            toggleLoading('btnCriarProposta', true, 'loaderProposta');
            try {
                const tx = await daoContract.criarProposta(titulo, duracao);
                showNotification("Transação enviada... aguarde.");
                await tx.wait();
                showNotification("Proposta criada com sucesso!");
                document.getElementById('propTitulo').value = '';
                document.getElementById('propDuracao').value = '';
                await listarPropostas();
            } catch (err) {
                console.error(err);
                showNotification("Erro ao criar: " + (err.reason || err.message), true);
            } finally {
                toggleLoading('btnCriarProposta', false, 'loaderProposta');
            }
        }

        async function votar(id, decisao) {
            const btnId = decisao ? `btnVoteSim-${id}` : `btnVoteNao-${id}`;
            const loaderId = decisao ? `loaderSim-${id}` : `loaderNao-${id}`;
            toggleLoading(btnId, true, loaderId);

            try {
                const tx = await daoContract.votar(id, decisao);
                showNotification(`Voto ${decisao ? 'SIM' : 'NÃO'} enviado. Aguarde...`);
                await tx.wait();

                // Cache local de segurança para evitar que o botão reapareça enquanto a RPC atrasa o indexamento de Logs
                localStorage.setItem('dao_voto_' + currentAddress.toLowerCase() + '_' + id, 'true');

                showNotification("Voto computado com sucesso!");
                await listarPropostas();
            } catch (err) {
                console.error(err);
                showNotification("Erro ao votar: " + (err.reason || err.message), true);
            } finally {
                toggleLoading(btnId, false, loaderId);
            }
        }

        async function listarPropostas() {
            const container = document.getElementById('listaPropostas');

            if (!daoContract) return;

            container.innerHTML = '<div class="spinner-container"><div class="loader spinner-large" style="display:block;"></div></div>';

            try {
                const bAtual = await daoContract.blocoAtual();
                blocoAtualGlobal = Number(bAtual);
                document.getElementById('currentBlockInfo').innerText = `Bloco Atual na Rede: ${blocoAtualGlobal}`;

                // Recalcula estimativa se o usuário estiver digitando
                calcularEstimativa(document.getElementById('propDuracao').value);

                // Atualizar Saldo ETH
                try {
                    const balanceEth = await provider.getBalance(currentAddress);
                    document.getElementById('userEthBalance').innerText = parseFloat(ethers.formatEther(balanceEth)).toFixed(4);
                } catch (e) {
                    console.error("Erro ao atualizar o saldo de ETH:", e);
                }

                // Usa totalPropostas() para saber quantas iterações fazer
                const total = await daoContract.totalPropostas();
                let html = "";

                if (Number(total) === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; color: var(--text-muted); padding: 40px; border: 1px dashed var(--border); border-radius: 12px;">
                            Nenhuma proposta foi criada até agora.<br>Seja o primeiro a lançar uma!
                        </div>`;
                    return;
                }

                // Busca eventos de voto para saber se o usuário já votou (LIMITADO AOS ÚLTIMOS 5000 BLOCOS)
                // Isso evita erros 400 de RPCs gratuitos que não suportam buscas do Bloco 0.
                const filtro = daoContract.filters.VotoRegistrado();
                const startBlock = Number(bAtual) > 5000 ? Number(bAtual) - 5000 : 0;
                let eventos = [];
                try {
                    eventos = await daoContract.queryFilter(filtro, startBlock, "latest");
                } catch (e) {
                    console.warn("Aviso: RPC não permitiu ler eventos antigos", e);
                }

                // Mapeia os IDs das propostas em que o currentAddress interagiu
                const propostasVotadas = new Set();
                eventos.forEach(evt => {
                    const idProposta = Number(evt.args[0]);
                    const votante = evt.args[1].toLowerCase();
                    if (votante === currentAddress.toLowerCase()) {
                        propostasVotadas.add(idProposta);
                    }
                });

                for (let i = Number(total) - 1; i >= 0; i--) {
                    try {
                        const p = await daoContract.statusProposta(i);
                        const ativa = p.ativa;
                        const votosSim = Number(p.sim);
                        const votosNao = Number(p.nao);
                        const totalVotos = votosSim + votosNao;

                        let pctSim = 50;
                        let pctNao = 50;

                        if (totalVotos > 0) {
                            pctSim = (votosSim / totalVotos) * 100;
                            pctNao = (votosNao / totalVotos) * 100;
                        } else if (!ativa) {
                            // Se terminou e não teve votos, mostramos a barra cinza vazia.
                            pctSim = 0;
                            pctNao = 0;
                        }

                        html += `
                            <div class="prop-item">
                                <div class="prop-header">
                                    <h4 class="prop-title">#${i}: ${p.titulo}</h4>
                                    <span class="badge ${ativa ? 'badge-open' : 'badge-closed'}">
                                        ${ativa ? '🔥 ABERTA' : '🔒 ENCERRADA'}
                                    </span>
                                </div>
                                
                                ${ativa ? `
                                <div class="prop-stats">
                                    <div class="stat-item">
                                        <span class="stat-label">Votos SIM 👍</span>
                                        <span class="stat-value sim">${votosSim}</span>
                                    </div>
                                    <div class="stat-item">
                                        <span class="stat-label">Votos NÃO 👎</span>
                                        <span class="stat-value nao">${votosNao}</span>
                                    </div>
                                    <div class="stat-item">
                                        <span class="stat-label">Fim no Bloco ⏳</span>
                                        <span class="stat-value" style="color:var(--text-main)">${p.terminaNoBloco.toString()}</span>
                                    </div>
                                </div>
                                ` : `
                                <div class="result-container">
                                    <div class="result-header">
                                        <span style="color: var(--success);">SIM: ${votosSim} (${pctSim.toFixed(0)}%)</span>
                                        <span style="color: var(--danger);">NÃO: ${votosNao} (${pctNao.toFixed(0)}%)</span>
                                    </div>
                                    <div class="result-bar-bg">
                                        <div class="result-bar-sim" style="width: ${pctSim}%;"></div>
                                        <div class="result-bar-nao" style="width: ${pctNao}%;"></div>
                                        ${totalVotos === 0 ? '<div style="width: 100%; background: var(--surface-light);"></div>' : ''}
                                    </div>
                                    <div style="text-align: center;">
                                        ${votosSim > votosNao
                                ? '<span class="result-badge" style="background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success);">🏆 APROVADA</span>'
                                : (votosNao > votosSim
                                    ? '<span class="result-badge" style="background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger);">❌ REJEITADA</span>'
                                    : '<span class="result-badge" style="background: rgba(148, 163, 184, 0.15); color: #cbd5e1; border: 1px solid #cbd5e1;">⚖️ EMPATE OU SEM VOTOS</span>'
                                )
                            }
                                    </div>
                                </div>
                                `}
                                
                                ${ativa ? (
                                (propostasVotadas.has(i) || localStorage.getItem('dao_voto_' + currentAddress.toLowerCase() + '_' + i) === 'true')
                                    ? `<div style="text-align:center; padding: 10px; background: rgba(16, 185, 129, 0.1); color: #34d399; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(16, 185, 129, 0.2);">✅ Seu voto já foi registrado nesta proposta!</div>`
                                    : `
                                    <div class="prop-footer" style="margin-top: 15px;">
                                        <button id="btnVoteSim-${i}" onclick="votar(${i}, true)" class="btn-success">
                                            <span class="loader" id="loaderSim-${i}"></span> 👍 Votar SIM
                                        </button>
                                        <button id="btnVoteNao-${i}" onclick="votar(${i}, false)" class="btn-danger">
                                            <span class="loader" id="loaderNao-${i}"></span> 👎 Votar NÃO
                                        </button>
                                    </div>
                                    `
                            ) : ''}
                            </div>
                        `;
                    } catch (e) {
                        console.warn('Erro ao carregar proposta ' + i, e);
                    }
                }

                container.innerHTML = html;
            } catch (err) {
                console.error("Erro completo:", err);
                const cause = err.reason || err.message || "Erro desconhecido";
                container.innerHTML = `<div style="color:var(--danger); text-align:center; padding:20px; border:1px solid var(--danger); border-radius:12px;">
                    <p style="font-weight:bold; margin-bottom:10px;">Erro ao carregar governança</p>
                    <p style="font-size:0.9rem; margin:0 0 10px 0;">Possível causa: ${cause}</p>
                    <p style="font-size:0.8rem; opacity:0.8; margin:0;">(Verifique se sua MetaMask está conectada na rede correta!)</p>
                </div>`;
            }
        }

        // Listener Global para trocas de rede pela própria MetaMask
        if (window.ethereum) {
            window.ethereum.on('chainChanged', (chainId) => {
                const btnMudarRede = document.getElementById('btnMudarRede');
                if (btnMudarRede) {
                    btnMudarRede.style.display = (chainId === '0xaa36a7' || parseInt(chainId, 16) === 11155111) ? 'none' : 'block';
                }

                // Recarrega a página automaticamente para evitar interagir com a DAO na rede errada
                // (Prática recomebndada pela documentação oficial da MetaMask)
                window.location.reload();
            });

            // Se o usuário trocar de carteira, também atualizo o app
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    window.location.reload();
                }
            });
        }
    </script>
</body>

</html>
